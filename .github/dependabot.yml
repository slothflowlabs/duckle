version: 2
# Quiet config: at most one grouped PR per ecosystem per month. The first run
# opened ~19 PRs (each major bump is its own PR and weekly is aggressive), so
# everything below is grouped (major + minor + patch) and the cadence is monthly.
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      cargo:
        patterns: ["*"]
        update-types: ["major", "minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      npm:
        patterns: ["*"]
        update-types: ["major", "minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      actions:
        patterns: ["*"]
        update-types: ["major", "minor", "patch"]
