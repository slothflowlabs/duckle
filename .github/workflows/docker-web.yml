name: docker-web

# Build + publish the Duckle web-editor image to GHCR so it can be deployed in
# one click - Coolify (#31), Portainer, or a plain `docker run`. The Coolify
# compose (docker-compose.coolify.yml) pulls ghcr.io/<owner>/duckle-web.
on:
  release:
    types: [published]
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      # Only rebuild the published image when something that lands in it changes.
      - 'Dockerfile.web'
      - 'crates/**'
      - 'frontend/**'
      - '.github/workflows/docker-web.yml'

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/duckle-web
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
