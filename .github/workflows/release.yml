name: Release

# Tag a version (e.g. `git tag v0.0.5 && git push --tags`) to build the
# Duckle binary for every OS and attach it directly to a draft GitHub
# release. We do NOT ship installers (no NSIS / MSI / DMG / DEB / RPM /
# AppImage). The asset on the release is the raw executable that the
# user can run.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to (re)upload binaries to. Builds from the branch this run is dispatched on; the tag itself is never moved. Leave empty on a normal tag push.'
        required: false
        default: ''
      os_filter:
        description: 'Limit the re-roll to one OS family. "all" builds every binary (default, and always used on a tag push); "linux" rebuilds and re-uploads only the two Linux binaries, leaving the macOS/Windows assets untouched.'
        required: false
        type: choice
        default: 'all'
        options:
          - all
          - linux

jobs:
  # Single point that creates the draft release so the per-OS build
  # jobs don't race on `gh release create`.
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create draft release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          REL_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
        run: |
          set -e
          tag="$REL_TAG"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release $tag already exists"
          else
            gh release create "$tag" --draft --title "Duckle $tag"
          fi

  # Build the static Linux runner ONCE and hand it to the per-OS build jobs as a
  # workflow artifact (NOT a release asset). Each desktop build embeds it so the
  # shipped binary can cross-build a Linux pipeline file from any OS. No separate
  # runner is published anywhere; the release page still carries only the desktop
  # apps. The job fails loudly if the runner is not produced, so a release can
  # never ship with the Linux target silently disabled.
  build-linux-runner:
    needs: prepare-release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Build the static Linux duckle-runner (musl, in Docker)
        run: bash scripts/build-runner-linux.sh
      - name: Upload as a workflow artifact (not a release asset)
        uses: actions/upload-artifact@v7
        with:
          name: duckle-runner-linux-x64
          path: apps/desktop/bin/duckle-runner-linux-x64
          if-no-files-found: error

  # Compute the build matrix so a workflow_dispatch can re-roll a single OS
  # family (os_filter=linux) without rebuilding/clobbering the other assets. A
  # normal tag push leaves os_filter unset and builds every binary.
  #   macOS: both built on the macos-14 (Apple Silicon) runner. The Intel binary
  #   is cross-compiled to x86_64-apple-darwin rather than run on a macos-13
  #   runner: GitHub's Intel-mac runners are scarce / being deprecated and
  #   routinely leave the job queued for hours, stalling the whole release.
  plan:
    needs: prepare-release
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        shell: bash
        env:
          OS_FILTER: ${{ github.event.inputs.os_filter }}
        run: |
          linux='[{"os":"ubuntu-24.04","binary":"duckle","asset":"Duckle-linux-x64"},{"os":"ubuntu-24.04-arm","binary":"duckle","asset":"Duckle-linux-arm64"}]'
          all='[{"os":"ubuntu-24.04","binary":"duckle","asset":"Duckle-linux-x64"},{"os":"ubuntu-24.04-arm","binary":"duckle","asset":"Duckle-linux-arm64"},{"os":"macos-14","binary":"duckle","asset":"Duckle-macos-x64","target":"x86_64-apple-darwin"},{"os":"macos-14","binary":"duckle","asset":"Duckle-macos-arm64"},{"os":"windows-latest","binary":"duckle.exe","asset":"Duckle-windows-x64.exe"},{"os":"windows-11-arm","binary":"duckle.exe","asset":"Duckle-windows-arm64.exe"}]'
          if [ "$OS_FILTER" = "linux" ]; then include="$linux"; else include="$all"; fi
          echo "matrix={\"include\":$include}" >> "$GITHUB_OUTPUT"

  build:
    needs: [prepare-release, build-linux-runner, plan]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      # Reclaim ~20 GB on Linux runners so the full workspace + embedded
      # binaries build does not hit "No space left on device".
      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/.ghcup /usr/local/share/boost \
            /usr/local/share/powershell /usr/share/swift || true
          sudo docker image prune --all --force || true
          df -h /
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm --prefix frontend ci
      - name: Build frontend (embedded into the Rust binary)
        run: npm --prefix frontend run build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target || '' }}
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux WebView deps (Tauri)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev \
            unixodbc-dev libltdl-dev
          # unixodbc-dev + libltdl-dev ship the static archives (libodbc.a,
          # libodbcinst.a, libltdl.a) the Teradata connector links statically on
          # Linux, so the shipped binary needs no libodbc.so.2 at runtime (#131).
          # Point odbc-sys at those archives (compile-time bundling + final link)
          # for this arch; redundant with .cargo/config.toml but robust if a
          # RUSTFLAGS override ever shadows the config rustflags.
          echo "ODBC_SYS_STATIC_PATH=/usr/lib/$(gcc -dumpmachine)" >> "$GITHUB_ENV"

      - name: Build duckle-runner + duckle-mcp (bundled into the app)
        shell: bash
        run: |
          set -e
          if [ -n "${{ matrix.target }}" ]; then
            cargo build --profile release-runner --target "${{ matrix.target }}" -p duckle-runner -p duckle-mcp
            base="target/${{ matrix.target }}/release-runner"
          else
            cargo build --profile release-runner -p duckle-runner -p duckle-mcp
            base="target/release-runner"
          fi
          mkdir -p apps/desktop/bin
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "$base/duckle-runner.exe" apps/desktop/bin/duckle-runner.exe
            cp "$base/duckle-mcp.exe" apps/desktop/bin/duckle-mcp.exe
          else
            cp "$base/duckle-runner" apps/desktop/bin/duckle-runner
            cp "$base/duckle-mcp" apps/desktop/bin/duckle-mcp
          fi

      # Stage the prebuilt static Linux runner so build.rs embeds it into THIS
      # desktop binary, enabling Build Pipeline -> Linux from any OS. This is a
      # workflow artifact from the build-linux-runner job, never a release asset.
      - name: Stage the embedded Linux runner
        uses: actions/download-artifact@v8
        with:
          name: duckle-runner-linux-x64
          path: apps/desktop/bin

      # protoc is needed only by the LanceDB sidecar build below (lancedb ->
      # lance pulls prost-build); the engine/desktop builds don't need it.
      - name: Install protoc (for the LanceDB sidecar)
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Build the LanceDB sidecar (duckle-lance) and stage it so build.rs embeds
      # it into THIS desktop binary -> src.lancedb / snk.lancedb work out of the
      # box. Kept out of the engine because lancedb pulls DataFusion + needs
      # protoc. Best-effort: if a (cross-)target build fails, the bundle omits it
      # and LanceDB nodes fall back to a duckle-lance on PATH / DUCKLE_LANCE_BIN.
      - name: Build duckle-lance (LanceDB sidecar)
        shell: bash
        continue-on-error: true
        run: |
          set -e
          if [ -n "${{ matrix.target }}" ]; then
            cargo build --profile release-runner --target "${{ matrix.target }}" -p duckle-lance
            base="target/${{ matrix.target }}/release-runner"
          else
            cargo build --profile release-runner -p duckle-lance
            base="target/release-runner"
          fi
          mkdir -p apps/desktop/bin
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "$base/duckle-lance.exe" apps/desktop/bin/duckle-lance.exe
          else
            cp "$base/duckle-lance" apps/desktop/bin/duckle-lance
          fi

      - name: Build raw Duckle binary
        shell: bash
        run: |
          set -e
          if [ -n "${{ matrix.target }}" ]; then
            cargo build --release --target "${{ matrix.target }}" \
              --manifest-path apps/desktop/Cargo.toml --features custom-protocol
          else
            cargo build --release \
              --manifest-path apps/desktop/Cargo.toml --features custom-protocol
          fi

      - name: Stage release assets
        shell: bash
        run: |
          set -e
          mkdir -p _release
          if [ -n "${{ matrix.target }}" ]; then
            src="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          else
            src="target/release/${{ matrix.binary }}"
          fi
          # The standalone desktop binary, named exactly as before so the
          # in-app update check (apps/desktop/src/update_check.rs) and the
          # README download table keep matching it. Single file, double-click.
          # The duckle-runner is embedded into this binary at compile time
          # (no separate with-runner asset needed).
          cp "$src" "_release/${{ matrix.asset }}"

      # Guard (issue #131): a shipped Linux binary must NOT carry a dynamic
      # libodbc.so dependency, or it fails to launch on machines without
      # unixODBC installed. The Teradata connector links unixODBC statically on
      # Linux (engine `teradata-static`); this check fails the release loudly if
      # that ever regresses, for the published asset and the two bundled gnu
      # binaries embedded into it.
      - name: Verify Linux binaries do not require libodbc.so
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -e
          fail=0
          for b in "_release/${{ matrix.asset }}" \
                   apps/desktop/bin/duckle-runner \
                   apps/desktop/bin/duckle-mcp; do
            [ -f "$b" ] || { echo "skip (missing): $b"; continue; }
            if readelf -d "$b" 2>/dev/null | grep -qi 'libodbc'; then
              echo "FAIL: $b dynamically requires libodbc.so"
              readelf -d "$b" 2>/dev/null | grep -i 'NEEDED' || true
              fail=1
            else
              echo "ok: $b (no libodbc.so dependency)"
            fi
          done
          [ "$fail" = 0 ] || { echo "::error::A Linux binary requires libodbc.so (issue #131 regression)"; exit 1; }

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          REL_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
        run: |
          set -e
          asset="${{ matrix.asset }}"
          gh release upload "$REL_TAG" "_release/$asset" --clobber

  # Publish SHA256SUMS.txt covering the 6 binaries so the in-app self-updater
  # can verify a downloaded build before swapping it in. Uploads are per-matrix
  # job, so checksums must be a separate job that pulls the finished assets back.
  checksums:
    name: Publish SHA256SUMS
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download assets, checksum, upload
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          REL_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
        run: |
          set -e
          mkdir -p _sums && cd _sums
          gh release download "$REL_TAG" --clobber
          # Checksum exactly the 6 published binaries (not any prior SHA file).
          sha256sum \
            Duckle-linux-x64 Duckle-linux-arm64 \
            Duckle-macos-x64 Duckle-macos-arm64 \
            Duckle-windows-x64.exe Duckle-windows-arm64.exe > SHA256SUMS.txt
          cat SHA256SUMS.txt
          gh release upload "$REL_TAG" SHA256SUMS.txt --clobber
