<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none" role="img" aria-label="Duckle logo">
  <defs>
    <linearGradient id="duckleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#18D4E0"/>
      <stop offset="1" stop-color="#5B6EFB"/>
    </linearGradient>
    <linearGradient id="duckleGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.34"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="squircle">
      <rect x="28" y="28" width="200" height="200" rx="54"/>
    </clipPath>
  </defs>

  <rect x="28" y="28" width="200" height="200" rx="54" fill="url(#duckleGrad)"/>
  <rect x="28" y="28" width="200" height="100" fill="url(#duckleGloss)" clip-path="url(#squircle)"/>

  <!-- shimmer sweep -->
  <g clip-path="url(#squircle)">
    <rect x="-120" y="28" width="80" height="200" fill="#ffffff" opacity="0.16" transform="skewX(-18)">
      <animate attributeName="x" values="-140;320" dur="3.6s" begin="0s" repeatCount="indefinite"/>
    </rect>
  </g>

  <text x="128" y="129" text-anchor="middle" dominant-baseline="central"
        font-family="'Segoe UI', system-ui, Arial, sans-serif" font-size="138" font-weight="800" fill="#ffffff">D</text>
</svg>
