<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" fill="none" role="img" aria-label="Duckle designer — illustration">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#18D4E0"/><stop offset="1" stop-color="#5B6EFB"/>
    </linearGradient>
    <linearGradient id="win" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E1320"/><stop offset="1" stop-color="#080B12"/>
    </linearGradient>
  </defs>
  <style>text{font-family:'Segoe UI',system-ui,Arial,sans-serif}</style>

  <rect x="1" y="1" width="1198" height="718" rx="16" fill="url(#win)" stroke="#1b2436" stroke-width="1.5"/>

  <!-- title bar -->
  <rect x="1.5" y="1.5" width="1197" height="48" rx="16" fill="#0c111c"/>
  <rect x="1.5" y="34" width="1197" height="16" fill="#0c111c"/>
  <rect x="22" y="16" width="18" height="18" rx="6" fill="url(#g)"/>
  <text x="48" y="30" font-size="14" font-weight="800" fill="#eaf2ff">Duckle</text>
  <rect x="118" y="14" width="118" height="22" rx="11" fill="#121a2b" stroke="#26334b"/>
  <circle cx="132" cy="25" r="4" fill="#fed060"/><text x="142" y="30" font-size="12" fill="#c4d2ec">DuckDB</text>
  <circle cx="1140" cy="25" r="6" fill="#2a3650"/><rect x="1158" y="19" width="12" height="12" fill="#2a3650"/><text x="1180" y="30" font-size="14" fill="#7a88a3">×</text>

  <!-- left palette -->
  <rect x="14" y="62" width="210" height="582" rx="12" fill="#0b1018" stroke="#172033"/>
  <text x="32" y="92" font-size="13" font-weight="700" fill="#9fb0cc" letter-spacing="0.04em">COMPONENTS</text>
  <g>
    <rect x="28" y="108" width="182" height="40" rx="9" fill="#121a2b" stroke="#243149"/><rect x="28" y="108" width="4" height="40" rx="2" fill="#fed060"/><text x="46" y="133" font-size="13" fill="#dbe6fb">CSV / File Source</text>
    <rect x="28" y="156" width="182" height="40" rx="9" fill="#121a2b" stroke="#243149"/><rect x="28" y="156" width="4" height="40" rx="2" fill="#18D4E0"/><text x="46" y="181" font-size="13" fill="#dbe6fb">Filter</text>
    <rect x="28" y="204" width="182" height="40" rx="9" fill="#121a2b" stroke="#243149"/><rect x="28" y="204" width="4" height="40" rx="2" fill="#18D4E0"/><text x="46" y="229" font-size="13" fill="#dbe6fb">Aggregate</text>
    <rect x="28" y="252" width="182" height="40" rx="9" fill="#121a2b" stroke="#243149"/><rect x="28" y="252" width="4" height="40" rx="2" fill="#18D4E0"/><text x="46" y="277" font-size="13" fill="#dbe6fb">Join / Lookup</text>
    <rect x="28" y="300" width="182" height="40" rx="9" fill="#121a2b" stroke="#243149"/><rect x="28" y="300" width="4" height="40" rx="2" fill="#a78bfa"/><text x="46" y="325" font-size="13" fill="#dbe6fb">Parquet Sink</text>
  </g>

  <!-- canvas -->
  <rect x="236" y="62" width="730" height="582" rx="12" fill="#090d15" stroke="#172033"/>
  <g opacity="0.5">
    <line x1="236" y1="160" x2="966" y2="160" stroke="#121a2b"/><line x1="236" y1="260" x2="966" y2="260" stroke="#121a2b"/>
    <line x1="236" y1="360" x2="966" y2="360" stroke="#121a2b"/><line x1="236" y1="460" x2="966" y2="460" stroke="#121a2b"/>
    <line x1="236" y1="560" x2="966" y2="560" stroke="#121a2b"/>
    <line x1="430" y1="62" x2="430" y2="644" stroke="#121a2b"/><line x1="620" y1="62" x2="620" y2="644" stroke="#121a2b"/><line x1="810" y1="62" x2="810" y2="644" stroke="#121a2b"/>
  </g>

  <!-- edges with flow -->
  <line x1="430" y1="330" x2="500" y2="330" stroke="#2e3c58" stroke-width="2.5"/>
  <line x1="660" y1="330" x2="730" y2="330" stroke="#2e3c58" stroke-width="2.5"/>
  <circle r="4" fill="#18D4E0"><animate attributeName="cx" values="430;500" dur="1.4s" repeatCount="indefinite"/><animate attributeName="cy" values="330;330" dur="1.4s" repeatCount="indefinite"/></circle>
  <circle r="4" fill="#5B6EFB"><animate attributeName="cx" values="660;730" dur="1.4s" begin="0.3s" repeatCount="indefinite"/><animate attributeName="cy" values="330;330" dur="1.4s" repeatCount="indefinite"/></circle>

  <!-- node: source -->
  <rect x="300" y="298" width="130" height="64" rx="13" fill="#111a2a" stroke="#2a3850" stroke-width="1.5"/>
  <rect x="300" y="298" width="5" height="64" rx="2.5" fill="#fed060"/>
  <text x="320" y="328" font-size="14" font-weight="700" fill="#eaf2ff">orders.csv</text>
  <text x="320" y="347" font-size="11.5" fill="#8090ad">source</text>

  <!-- node: filter (selected) -->
  <rect x="500" y="298" width="160" height="64" rx="13" fill="#111a2a" stroke="url(#g)" stroke-width="2"/>
  <rect x="500" y="298" width="5" height="64" rx="2.5" fill="#18D4E0"/>
  <text x="520" y="328" font-size="14" font-weight="700" fill="#eaf2ff">Filter</text>
  <text x="520" y="347" font-size="11.5" fill="#8fa6cc">status = 'paid'</text>

  <!-- node: sink -->
  <rect x="730" y="298" width="150" height="64" rx="13" fill="#111a2a" stroke="#2a3850" stroke-width="1.5"/>
  <rect x="730" y="298" width="5" height="64" rx="2.5" fill="#a78bfa"/>
  <text x="750" y="328" font-size="14" font-weight="700" fill="#eaf2ff">clean.parquet</text>
  <text x="750" y="347" font-size="11.5" fill="#8090ad">sink</text>

  <!-- run button -->
  <rect x="846" y="80" width="100" height="34" rx="9" fill="url(#g)"/>
  <text x="896" y="102" text-anchor="middle" font-size="14" font-weight="800" fill="#06121b">▶  Run</text>

  <!-- right properties -->
  <rect x="978" y="62" width="208" height="582" rx="12" fill="#0b1018" stroke="#172033"/>
  <text x="996" y="92" font-size="13" font-weight="700" fill="#9fb0cc" letter-spacing="0.04em">PROPERTIES — FILTER</text>
  <text x="996" y="124" font-size="12" fill="#7e8ca6">Condition</text>
  <rect x="996" y="132" width="172" height="34" rx="8" fill="#121a2b" stroke="#26334b"/><text x="1008" y="153" font-size="12" fill="#cfe0ff">status  =  paid</text>
  <text x="996" y="190" font-size="12" fill="#7e8ca6">Match</text>
  <rect x="996" y="198" width="172" height="34" rx="8" fill="#121a2b" stroke="#26334b"/><text x="1008" y="219" font-size="12" fill="#cfe0ff">All conditions (AND)</text>
  <text x="996" y="256" font-size="12" fill="#7e8ca6">Generated SQL</text>
  <rect x="996" y="264" width="172" height="48" rx="8" fill="#0c1422" stroke="#22304a"/><text x="1008" y="285" font-size="11" fill="#7fd9e6">SELECT * FROM src</text><text x="1008" y="301" font-size="11" fill="#7fd9e6">WHERE status='paid'</text>

  <!-- bottom output -->
  <rect x="236" y="600" width="730" height="44" rx="10" fill="#0c1422" stroke="#1c2a40"/>
  <circle cx="262" cy="622" r="6" fill="#3ad29a"/>
  <text x="278" y="627" font-size="13" font-weight="700" fill="#dff7ee">Run succeeded</text>
  <text x="410" y="627" font-size="12.5" fill="#9fb0cc">2 rows written · 18 ms · DuckDB</text>
</svg>
